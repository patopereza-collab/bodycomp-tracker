<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BodyComp Tracker — Acceso</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </div>
      <div class="auth-app-name">BodyComp Tracker</div>
      <div class="auth-app-sub">Seguimiento de composición corporal</div>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="showTab('login')">Iniciar sesión</button>
      <button class="auth-tab" id="tab-registro" onclick="showTab('registro')">Crear cuenta</button>
    </div>

    <!-- Error -->
    <div class="auth-error" id="auth-error"></div>

    <!-- Login form -->
    <form class="auth-form" id="form-login" onsubmit="handleLogin(event)">
      <div class="field-row">
        <label for="login-email">Correo electrónico</label>
        <input type="email" id="login-email" class="field-input" placeholder="tu@email.com" required autocomplete="email">
      </div>
      <div class="field-row">
        <label for="login-password">Contraseña</label>
        <input type="password" id="login-password" class="field-input" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primary" id="btn-login">Iniciar sesión</button>
    </form>

    <!-- Registro form (hidden by default) -->
    <form class="auth-form" id="form-registro" style="display:none" onsubmit="handleRegistro(event)">
      <div class="field-row">
        <label for="reg-email">Correo electrónico</label>
        <input type="email" id="reg-email" class="field-input" placeholder="tu@email.com" required autocomplete="email">
      </div>
      <div class="field-row">
        <label for="reg-password">Contraseña</label>
        <input type="password" id="reg-password" class="field-input" placeholder="Mín. 6 caracteres" required minlength="6" autocomplete="new-password">
      </div>
      <div class="field-row">
        <label for="reg-confirm">Confirmar contraseña</label>
        <input type="password" id="reg-confirm" class="field-input" placeholder="Repetir contraseña" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn-primary" id="btn-registro">Crear cuenta</button>
    </form>

  </div>
</div>

<script src="js/supabase.js"></script>
<script>
// Redirect if already logged in
(async () => {
  const session = await getSession();
  if (session) window.location.href = '/historial.html';
})();

function showTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('tab-login').classList.toggle('active', isLogin);
  document.getElementById('tab-registro').classList.toggle('active', !isLogin);
  document.getElementById('form-login').style.display   = isLogin ? 'flex' : 'none';
  document.getElementById('form-registro').style.display = isLogin ? 'none' : 'flex';
  hideError();
}

function showError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.classList.add('visible');
}

function hideError() {
  document.getElementById('auth-error').classList.remove('visible');
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.innerHTML = loading
    ? '<span class="spinner"></span>Cargando...'
    : btn.dataset.label;
}

document.getElementById('btn-login').dataset.label   = 'Iniciar sesión';
document.getElementById('btn-registro').dataset.label = 'Crear cuenta';

async function handleLogin(e) {
  e.preventDefault();
  hideError();
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  setLoading('btn-login', true);
  const { error } = await signIn(email, password);
  setLoading('btn-login', false);
  if (error) { showError(error.message); return; }
  const session = await getSession();
  const { data: profile } = await getProfile(session.user.id);
  window.location.href = profile?.nombre ? '/historial.html' : '/perfil.html';
}

async function handleRegistro(e) {
  e.preventDefault();
  hideError();
  const email    = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const confirm  = document.getElementById('reg-confirm').value;
  if (password !== confirm) { showError('Las contraseñas no coinciden.'); return; }
  if (password.length < 6)  { showError('La contraseña debe tener al menos 6 caracteres.'); return; }
  setLoading('btn-registro', true);
  const { error } = await signUp(email, password);
  setLoading('btn-registro', false);
  if (error) { showError(error.message); return; }
  window.location.href = '/perfil.html';
}
</script>
</body>
</html>
